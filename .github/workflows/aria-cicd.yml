name: Aria CI/CD

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release from this run"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release tag for manual releases (example: v0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      ARIA_PACK_KEY: ${{ secrets.ARIA_PACK_KEY }}
      ProgramData: C:\ProgramData
      ALLUSERSPROFILE: C:\ProgramData
      ProgramFiles: C:\Program Files
      ProgramFiles(x86): C:\Program Files (x86)
      CommonProgramFiles: C:\Program Files\Common Files
      CommonProgramFiles(x86): C:\Program Files (x86)\Common Files

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Check packaging key
        id: pack-key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ARIA_PACK_KEY)) {
            "has_key=false" >> $env:GITHUB_OUTPUT
            Write-Host "ARIA_PACK_KEY is not set. CI will run build/smoke/publish and skip encrypted Pak packaging."
          } else {
            "has_key=true" >> $env:GITHUB_OUTPUT
            Write-Host "ARIA_PACK_KEY is set. CI will generate encrypted Pak artifacts."
          }

      - name: Require key for release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ARIA_PACK_KEY)) {
            throw "ARIA_PACK_KEY secret is required for GitHub Release builds."
          }

      - name: Run CI pipeline script
        shell: pwsh
        run: |
          if ("${{ steps.pack-key.outputs.has_key }}" -eq "true") {
            ./scripts/cicd.ps1 -Project src/AriaEngine/AriaEngine.csproj -OutDir artifacts/publish -InitScript init.aria -MainScript assets/scripts/main.aria
          } else {
            ./scripts/cicd.ps1 -Project src/AriaEngine/AriaEngine.csproj -OutDir artifacts/publish -InitScript init.aria -MainScript assets/scripts/main.aria -SkipPackage
          }

      - name: Create distribution zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/dist | Out-Null
          $name = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "run-${{ github.run_number }}" }
          $zip = "artifacts/dist/AriaEngine-$name-win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path artifacts/publish/* -DestinationPath $zip -Force
          "zip_path=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria-win-x64
          path: artifacts/dist/*.zip
          if-no-files-found: error

      - name: Resolve release metadata
        id: release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } elseif (-not [string]::IsNullOrWhiteSpace("${{ inputs.release_tag }}")) {
            $tag = "${{ inputs.release_tag }}"
          } else {
            $tag = "v0.0.${{ github.run_number }}"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=AriaEngine $tag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.release.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          files: artifacts/dist/*.zip
          fail_on_unmatched_files: true
